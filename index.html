<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<title>Bernalillo County Assessor – Spatial Equity</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<style>
body{margin:0;font-family:system-ui,-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f3f4f6;color:#222}
.gate{background:#fff;padding:28px 32px;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,.08);max-width:380px;width:92%}
.gate h1{margin:0 0 12px;font-size:16px;color:#08306b}
.gate p{margin:0 0 14px;font-size:12px;color:#666;line-height:1.5}
.gate input{width:100%;padding:8px 10px;border:1px solid #ccc;border-radius:4px;font-size:14px;box-sizing:border-box}
.gate button{margin-top:10px;width:100%;padding:9px;font-size:13px;font-weight:600;background:#185FA5;color:#fff;border:none;border-radius:4px;cursor:pointer}
.gate button:disabled{opacity:.55;cursor:not-allowed}
.err{color:#c41a1a;font-size:11px;margin-top:6px;min-height:15px}
.pg{margin-top:8px;font-size:11px;color:#888;min-height:14px}
</style>
</head><body>
<div class="gate">
  <h1>Bernalillo County Spatial Equity</h1>
  <p>Protected access. Enter the password provided by the Assessor's Office.</p>
  <form id="gateForm">
    <input type="password" id="pw" placeholder="Password" autocomplete="current-password" autofocus>
    <button id="gateBtn" type="submit">Unlock</button>
    <div class="err" id="err"></div>
    <div class="pg" id="pg"></div>
  </form>
</div>
<script>
const $=id=>document.getElementById(id);
const setErr=s=>$('err').textContent=s||'';
const setPg=s=>$('pg').textContent=s||'';

function b64ToBytes(b64){const s=atob(b64);const b=new Uint8Array(s.length);for(let i=0;i<s.length;i++)b[i]=s.charCodeAt(i);return b;}

// Client-side brute-force throttle. Tracks failed attempts in sessionStorage
// (cleared on browser/tab close). Not a security boundary — the AES-GCM
// auth tag is — but it blunts scripted guessing against the static host.
const THROTTLE_KEY='se_gate_fails';
const THROTTLE_MAX=8;                // hard cap per session
const THROTTLE_WINDOW_MS=60*1000;    // attempts inside this window count
function throttleState(){
  try{return JSON.parse(sessionStorage.getItem(THROTTLE_KEY))||{fails:[],lockUntil:0};}
  catch(_){return{fails:[],lockUntil:0};}
}
function throttleSave(st){try{sessionStorage.setItem(THROTTLE_KEY,JSON.stringify(st));}catch(_){}}
function throttleCheck(){
  const st=throttleState();const now=Date.now();
  st.fails=st.fails.filter(t=>now-t<THROTTLE_WINDOW_MS);
  if(st.lockUntil&&st.lockUntil>now)
    return{ok:false,wait:Math.ceil((st.lockUntil-now)/1000)};
  if(st.fails.length>=THROTTLE_MAX){
    // Exponential lockout: 15s, 30s, 60s, 120s capped at 5min.
    const prior=Math.floor(st.fails.length/THROTTLE_MAX);
    const lock=Math.min(300,15*Math.pow(2,prior-1))*1000;
    st.lockUntil=now+lock;throttleSave(st);
    return{ok:false,wait:Math.ceil(lock/1000)};
  }
  return{ok:true};
}
function throttleFail(){
  const st=throttleState();st.fails.push(Date.now());throttleSave(st);
}
function throttleReset(){try{sessionStorage.removeItem(THROTTLE_KEY);}catch(_){}}

async function deriveKey(pw,salt,iter){
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey(
    {name:'PBKDF2',salt,iterations:iter,hash:'SHA-256'},
    km,{name:'AES-GCM',length:256},false,['decrypt']);
}

async function decryptFile(path,key){
  const r=await fetch(path);
  if(!r.ok)throw new Error('HTTP '+r.status+' for '+path);
  const buf=await r.arrayBuffer();
  if(buf.byteLength<28)throw new Error('File too small for AES-GCM: '+path+' ('+buf.byteLength+' bytes)');
  const iv=buf.slice(0,12),ct=buf.slice(12);
  return crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);
}

// Inject the features.js script tag into the decrypted HTML. Placed as the
// first child of <head> so it runs before Leaflet initializes — features.js
// uses a setter trap on window.L to capture the map instance at create time
// without requiring any edits to the encrypted body.
function injectFeaturesScript(html){
  // No defer/async — features.js MUST run before Leaflet is processed so its
  // setter trap on window.L can capture the map instance at create time.
  const tag='<script src="features.js"></scr'+'ipt>';
  if(/<head[^>]*>/i.test(html))
    return html.replace(/<head([^>]*)>/i,(m,attrs)=>'<head'+attrs+'>'+tag);
  // No <head> — prepend. Browser will still parse it.
  return tag+html;
}

// Idle-timeout: after IDLE_MS of no user activity, blow away the decrypted
// document and bounce back to the gate. Keeps decrypted buffers from
// lingering in memory on unattended kiosks. The counter resets on any
// mouse/keyboard/touch activity.
const IDLE_MS=20*60*1000;   // 20 minutes
const IDLE_WARN_MS=19*60*1000;
function installIdleTimer(){
  let last=Date.now();
  const bump=()=>{last=Date.now();};
  ['mousemove','keydown','touchstart','scroll','click'].forEach(ev=>
    window.addEventListener(ev,bump,{passive:true}));
  setInterval(()=>{
    const idle=Date.now()-last;
    if(idle>=IDLE_MS){
      try{sessionStorage.setItem('se_idle_reload','1');}catch(_){}
      location.reload();
    }else if(idle>=IDLE_WARN_MS){
      try{
        const el=document.getElementById('__se_idle_warn')||(()=>{
          const d=document.createElement('div');
          d.id='__se_idle_warn';
          d.style.cssText='position:fixed;top:12px;right:12px;z-index:99999;background:#c41a1a;color:#fff;padding:8px 14px;border-radius:4px;font:13px system-ui;box-shadow:0 2px 8px rgba(0,0,0,.2)';
          document.body.appendChild(d);return d;})();
        el.textContent='Session will lock in '+Math.ceil((IDLE_MS-idle)/1000)+'s — move the mouse to stay signed in.';
      }catch(_){}
    }
  },5000);
}

$('gateForm').addEventListener('submit',async e=>{
  e.preventDefault();
  setErr('');
  const pw=$('pw').value;
  if(!pw){setErr('Enter a password.');return;}
  const th=throttleCheck();
  if(!th.ok){setErr('Too many attempts. Try again in '+th.wait+'s.');return;}
  $('gateBtn').disabled=true;
  try{
    setPg('Fetching manifest...');
    const manRes=await fetch('data/enc_manifest.json');
    if(!manRes.ok)throw new Error('Manifest fetch failed: HTTP '+manRes.status+'. Check that data/enc_manifest.json was uploaded to the deploy branch.');
    const manText=await manRes.text();
    let man;
    try{man=JSON.parse(manText);}
    catch(_){throw new Error('Manifest is not JSON (server returned '+(manText.slice(0,40))+'...). Likely the .enc files were uploaded to the wrong path.');}
    if(!man.salt||!man.iterations)throw new Error('Manifest is missing salt or iterations.');
    const salt=b64ToBytes(man.salt);
    setPg('Deriving key...');
    const key=await deriveKey(pw,salt,man.iterations);

    setPg('Fetching encrypted assets...');
    const [coreBuf,layersBuf,htmlBuf]=await Promise.all([
      decryptFile('data/core.json.enc',key).catch(e=>{throw new Error('decrypt_core:'+(e&&e.message||e));}),
      decryptFile('data/layers.json.enc',key).catch(e=>{throw new Error('decrypt_layers:'+(e&&e.message||e));}),
      decryptFile('index_body.html.enc',key).catch(e=>{throw new Error('decrypt_html:'+(e&&e.message||e));}),
    ]);

    setPg('Rendering...');
    const dec=new TextDecoder();
    const coreText=dec.decode(coreBuf);
    const layersText=dec.decode(layersBuf);
    const htmlText=injectFeaturesScript(dec.decode(htmlBuf));

    // Successful decrypt — clear throttle counter.
    throttleReset();

    // Intercept the real page's fetch calls for data/core.json &
    // data/layers.json and hand back the decrypted payload instead.
    const origFetch=window.fetch.bind(window);
    function matchPath(u,name){
      // Strip query + hash so data/core.json?v=123 still matches.
      const base=u.split('#')[0].split('?')[0];
      return base===name||base.endsWith('/'+name);
    }
    window.fetch=function(url,init){
      // Normalize string / URL / Request to a plain URL string. The prior
      // `url.url` guard only handled Request and silently fell through for
      // `fetch(new URL(...))`, which then hit the network and 404'd.
      let u='';
      if(typeof url==='string')u=url;
      else if(url&&typeof url.url==='string')u=url.url;           // Request
      else if(url)u=String(url);                                  // URL / other
      if(matchPath(u,'data/core.json'))
        return Promise.resolve(new Response(coreText,{status:200,headers:{'Content-Type':'application/json'}}));
      if(matchPath(u,'data/layers.json'))
        return Promise.resolve(new Response(layersText,{status:200,headers:{'Content-Type':'application/json'}}));
      return origFetch(url,init);
    };

    // Replace the document with the decrypted HTML. document.open() keeps
    // the same window, so our fetch override and all other globals persist
    // into the newly written page.
    document.open();
    document.write(htmlText);
    document.close();

    // Kick off the idle watchdog after the body renders.
    installIdleTimer();
  }catch(err){
    const msg=String(err&&err.message||err);
    // decrypt_* prefix means the file fetched but GCM tag verification
    // failed (wrong password) OR the file was fetched but is HTML (a 404
    // served as index.html), which also fails the auth tag. Surface the
    // underlying HTTP status when present so deploy misconfig is visible.
    if(msg.startsWith('decrypt_')){
      if(msg.indexOf('HTTP ')>=0)setErr('Encrypted asset missing on server: '+msg);
      else{throttleFail();setErr('Wrong password (or corrupted data).');}
    }else setErr(msg);
    setPg('');
    $('gateBtn').disabled=false;
  }
});

// Surface an idle-lockout message on reload.
try{
  if(sessionStorage.getItem('se_idle_reload')){
    sessionStorage.removeItem('se_idle_reload');
    setPg('Session locked after idle timeout. Re-enter password.');
  }
}catch(_){}
</script>
</body></html>
