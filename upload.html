<div class="header">
  <h1>Upload Map Data</h1>
  <a href="index.html" target="_blank" style="display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);color:#fff;padding:8px 18px;border-radius:8px;text-decoration:none;font-weight:600;font-size:14px;border:1px solid rgba(255,255,255,.3)">&#127758; Open Map &rarr;</a>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ── Parsers ──────────────────────────────────────────────────────────────────
function parseGeoJSON(text){
  const obj=JSON.parse(text);
  if(obj.type==='FeatureCollection'||obj.type==='Feature'||(obj.type&&obj.coordinates))return obj;
  throw new Error('Not valid GeoJSON');
}

function parseKML(text){
  const parser=new DOMParser();
  const doc=parser.parseFromString(text,'text/xml');
  if(doc.querySelector('parsererror'))throw new Error('Invalid KML');
  const features=[];
  doc.querySelectorAll('Placemark').forEach(pm=>{
    const name=(pm.querySelector('name')||{}).textContent||'';
    const desc=(pm.querySelector('description')||{}).textContent||'';
    const props={name,description:desc};
    const pt=pm.querySelector('Point coordinates');
    if(pt){const c=pt.textContent.trim().split(',').map(Number);features.push({type:'Feature',properties:props,geometry:{type:'Point',coordinates:[c[0],c[1]]}});return;}
    const ls=pm.querySelector('LineString coordinates');
    if(ls){const coords=ls.textContent.trim().split(/\s+/).map(s=>{const c=s.split(',').map(Number);return[c[0],c[1]];});features.push({type:'Feature',properties:props,geometry:{type:'LineString',coordinates:coords}});return;}
    const pg=pm.querySelector('Polygon outerBoundaryIs LinearRing coordinates');
    if(pg){const coords=pg.textContent.trim().split(/\s+/).map(s=>{const c=s.split(',').map(Number);return[c[0],c[1]];});features.push({type:'Feature',properties:props,geometry:{type:'Polygon',coordinates:[coords]}});}
  });
  if(!features.length)throw new Error('No placemarks found in KML');
  return{type:'FeatureCollection',features};
}

function parseGPX(text){
  const parser=new DOMParser();
  const doc=parser.parseFromString(text,'text/xml');
  if(doc.querySelector('parsererror'))throw new Error('Invalid GPX');
  const features=[];
  doc.querySelectorAll('wpt').forEach(wpt=>{
    const lat=parseFloat(wpt.getAttribute('lat')),lon=parseFloat(wpt.getAttribute('lon'));
    const name=(wpt.querySelector('name')||{}).textContent||'';
    features.push({type:'Feature',properties:{name},geometry:{type:'Point',coordinates:[lon,lat]}});
  });
  doc.querySelectorAll('trk').forEach(trk=>{
    const name=(trk.querySelector('name')||{}).textContent||'';
    trk.querySelectorAll('trkseg').forEach(seg=>{
      const coords=[];seg.querySelectorAll('trkpt').forEach(pt=>{coords.push([parseFloat(pt.getAttribute('lon')),parseFloat(pt.getAttribute('lat'))]);});
      if(coords.length)features.push({type:'Feature',properties:{name},geometry:{type:'LineString',coordinates:coords}});
    });
  });
  doc.querySelectorAll('rte').forEach(rte=>{
    const name=(rte.querySelector('name')||{}).textContent||'';
    const coords=[];rte.querySelectorAll('rtept').forEach(pt=>{coords.push([parseFloat(pt.getAttribute('lon')),parseFloat(pt.getAttribute('lat'))]);});
    if(coords.length)features.push({type:'Feature',properties:{name},geometry:{type:'LineString',coordinates:coords}});
  });
  if(!features.length)throw new Error('No features found in GPX');
  return{type:'FeatureCollection',features};
}

function parseCSV(text){
  const lines=text.trim().split(/\r?\n/);
  if(lines.length<2)throw new Error('CSV/TSV must have a header and at least one row');
  const firstLine=lines[0];
  const delim=firstLine.includes('\t')?'\t':firstLine.includes(';')?';':',';
  const headers=firstLine.split(delim).map(h=>h.trim().toLowerCase().replace(/"/g,''));
  let latIdx=headers.findIndex(h=>/^(lat|latitude|la|y|ycoord|y_coord)$/i.test(h));
  let lonIdx=headers.findIndex(h=>/^(lon|lng|longitude|long|ln|x|xcoord|x_coord)$/i.test(h));
  const rawHeaders=firstLine.split(delim).map(h=>h.trim().replace(/"/g,''));
  if(latIdx<0||lonIdx<0){
    // Check for neighborhood field — allow tabular-only data
    const hasNbhd=headers.some(h=>/^(nbhd|neighborhood|nbrhd|neigh|hood|nghbrhd|nghbr)$/.test(h));
    if(!hasNbhd)throw new Error('Needs lat/lon columns (lat/latitude/la/y/ycoord and lon/lng/longitude/long/ln/x/xcoord)');
    // For tabular data, keep only analysis-relevant fields to save memory
    const keepFields=new Set();
    rawHeaders.forEach((h,j)=>{
      const lc=h.toLowerCase();
      if(/^(nbhd|neighborhood|nbrhd|taxyr|yr|year|tax_year|taxyear|upc|parid|parcel|owner|own1)$/i.test(lc)||
         /protest|val.?freeze|vf_|valfreeze|head.?of.?house|hoh|veteran|vet.*exemp|disabled.?vet|vet.?waiver|exemp|exemcode/i.test(lc)||
         /totvalue|totalapp|nettaxable|landvalue|imptvalue|saleprice|yrbuilt|propclass|luc|rolltype|valclass/i.test(lc))
        keepFields.add(j);
    });
    const features=[];
    for(let i=1;i<lines.length;i++){
      if(!lines[i].trim())continue;
      const vals=lines[i].split(delim).map(v=>v.trim().replace(/"/g,''));
      const props={};
      rawHeaders.forEach((h,j)=>{
        if(!keepFields.has(j))return;
        const v=vals[j];
        props[h]=(v===''||v==null)?'':(isNaN(v)?v:parseFloat(v));
      });
      features.push({type:'Feature',properties:props,geometry:null});
    }
    if(!features.length)throw new Error('No records found');
    return{type:'FeatureCollection',features};
  }
  const features=[];
  for(let i=1;i<lines.length;i++){
    if(!lines[i].trim())continue;
    const vals=lines[i].split(delim).map(v=>v.trim().replace(/"/g,''));
    const lat=parseFloat(vals[latIdx]),lon=parseFloat(vals[lonIdx]);
    if(isNaN(lat)||isNaN(lon))continue;
    const props={};
    rawHeaders.forEach((h,j)=>{if(j!==latIdx&&j!==lonIdx)props[h]=vals[j]||'';});
    features.push({type:'Feature',properties:props,geometry:{type:'Point',coordinates:[lon,lat]}});
  }
  if(!features.length)throw new Error('No valid coordinates found');
  return{type:'FeatureCollection',features};
}

function parseDBF(buf){
  const dv=new DataView(buf);
  if(buf.byteLength<32)throw new Error('File too small to be a valid DBF');
  const numRecords=dv.getUint32(4,true);
  const headerLen=dv.getUint16(8,true);
  const recordLen=dv.getUint16(10,true);
  if(numRecords<=0||headerLen<33||recordLen<1)throw new Error('Invalid DBF header');
  const fields=[];
  let pos=32;
  while(pos<headerLen-1&&pos+32<=buf.byteLength){
    const firstByte=dv.getUint8(pos);
    if(firstByte===0x0D||firstByte===0x00)break;
    let name='';
    for(let i=0;i<11;i++){const c=dv.getUint8(pos+i);if(c>0x20&&c<0x7F)name+=String.fromCharCode(c);}
    name=name.trim();
    if(!name){pos+=32;continue;}
    const type=String.fromCharCode(dv.getUint8(pos+11));
    const len=dv.getUint8(pos+16);
    if(len<=0){pos+=32;continue;}
    fields.push({name,type,len});pos+=32;
  }
  if(!fields.length)throw new Error('No fields found in DBF');
  const lowerNames=fields.map(f=>f.name.toLowerCase());
  let latIdx=lowerNames.findIndex(n=>/^(lat|latitude|la|y|ycoord|y_coord|point_y|lat_dd)$/.test(n));
  let lonIdx=lowerNames.findIndex(n=>/^(lon|lng|longitude|long|ln|x|xcoord|x_coord|point_x|long_dd|lon_dd)$/.test(n));
  if(latIdx<0||lonIdx<0){
    const numFields=fields.map((f,i)=>({i,name:f.name,type:f.type})).filter(f=>f.type==='N'||f.type==='F');
    if(numFields.length>=2&&headerLen+recordLen<=buf.byteLength){
      const decoder=new TextDecoder('latin1');
      let offset=headerLen+1;
      const testVals={};
      for(let f=0;f<fields.length;f++){
        testVals[f]=parseFloat(decoder.decode(new Uint8Array(buf,offset,fields[f].len)).trim());
        offset+=fields[f].len;
      }
      for(const nf of numFields){
        const v=testVals[nf.i];
        if(!isNaN(v)){
          if(v>=-90&&v<=90&&latIdx<0)latIdx=nf.i;
          else if(v>=-180&&v<=180&&lonIdx<0)lonIdx=nf.i;
        }
      }
    }
  }
  if(latIdx<0||lonIdx<0){
    // Check if this file has a neighborhood field — allow tabular-only data for choropleth aggregation
    const hasNbhd=lowerNames.some(n=>/^(nbhd|neighborhood|nbrhd|neigh|hood|nghbrhd|nghbr)$/.test(n));
    if(!hasNbhd)throw new Error('No lat/lon fields found. Fields: '+fields.map(f=>f.name).join(', '));
    // Parse as tabular data with null geometries — keep only analysis-relevant fields
    const keepIdx=new Set();
    fields.forEach((fld,i)=>{
      const lc=fld.name.toLowerCase();
      if(/^(nbhd|neighborhood|nbrhd|taxyr|yr|year|tax_year|taxyear|upc|parid|parcel|owner|own1)$/i.test(lc)||
         /protest|val.?freeze|vf_|valfreeze|head.?of.?house|hoh|veteran|vet.*exemp|disabled.?vet|vet.?waiver|exemp|exemcode/i.test(lc)||
         /totvalue|totalapp|nettaxable|landvalue|imptvalue|saleprice|yrbuilt|propclass|luc|rolltype|valclass/i.test(lc))
        keepIdx.add(i);
    });
    const decoder=new TextDecoder('latin1');
    const features=[];
    for(let r=0;r<Math.min(numRecords,500000);r++){
      const recStart=headerLen+r*recordLen;
      if(recStart+recordLen>buf.byteLength)break;
      if(dv.getUint8(recStart)===0x2A)continue;
      let offset=recStart+1;const props={};
      for(let f=0;f<fields.length;f++){
        if(offset+fields[f].len>buf.byteLength)break;
        const raw=decoder.decode(new Uint8Array(buf,offset,fields[f].len)).trim();
        offset+=fields[f].len;
        if(!keepIdx.has(f))continue;
        if(raw)props[fields[f].name]=(fields[f].type==='N'||fields[f].type==='F')?(parseFloat(raw)||(parseFloat(raw)===0?0:raw)):raw;
      }
      features.push({type:'Feature',properties:props,geometry:null});
    }
    if(!features.length)throw new Error('No records found in DBF');
    return{type:'FeatureCollection',features};
  }
  const decoder=new TextDecoder('latin1');
  const features=[];
  for(let r=0;r<Math.min(numRecords,500000);r++){
    const recStart=headerLen+r*recordLen;
    if(recStart+recordLen>buf.byteLength)break;
    if(dv.getUint8(recStart)===0x2A)continue;
    let offset=recStart+1;const props={};let lat=NaN,lon=NaN;
    for(let f=0;f<fields.length;f++){
      if(offset+fields[f].len>buf.byteLength)break;
      const raw=decoder.decode(new Uint8Array(buf,offset,fields[f].len)).trim();
      offset+=fields[f].len;
      if(f===latIdx){lat=parseFloat(raw);continue;}
      if(f===lonIdx){lon=parseFloat(raw);continue;}
      if(raw)props[fields[f].name]=(fields[f].type==='N'||fields[f].type==='F')?(parseFloat(raw)||(parseFloat(raw)===0?0:raw)):raw;
    }
    if(!isNaN(lat)&&!isNaN(lon)&&lat!==0&&lon!==0)features.push({type:'Feature',properties:props,geometry:{type:'Point',coordinates:[lon,lat]}});
  }
  if(!features.length)throw new Error('No valid coordinates found in DBF ('+numRecords+' records, fields: '+fields.map(f=>f.name).join(', ')+')');
  return{type:'FeatureCollection',features};
}

function parseJSONArray(text){
  const arr=JSON.parse(text);
  if(!Array.isArray(arr)||!arr.length)throw new Error('Empty JSON array');
  const keys=Object.keys(arr[0]);
  const lk=keys.map(k=>k.toLowerCase());
  const latKey=keys[lk.findIndex(k=>/^(la|lat|latitude|y)$/.test(k))];
  const lonKey=keys[lk.findIndex(k=>/^(ln|lon|lng|longitude|long|x)$/.test(k))];
  if(!latKey||!lonKey)throw new Error('JSON array needs lat/lon keys');
  const features=[];
  arr.forEach(obj=>{
    const lat=parseFloat(obj[latKey]),lon=parseFloat(obj[lonKey]);
    if(isNaN(lat)||isNaN(lon))return;
    const props={};Object.keys(obj).forEach(k=>{if(k!==latKey&&k!==lonKey)props[k]=obj[k];});
    features.push({type:'Feature',properties:props,geometry:{type:'Point',coordinates:[lon,lat]}});
  });
  if(!features.length)throw new Error('No valid coordinates in JSON array');
  return{type:'FeatureCollection',features};
}

function detectFormat(name,text){
  const ext=name.split('.').pop().toLowerCase();
  if(ext==='geojson')return parseGeoJSON(text);
  if(ext==='kml')return parseKML(text);
  if(ext==='gpx')return parseGPX(text);
  if(ext==='csv'||ext==='tsv'||ext==='txt')return parseCSV(text);
  if(ext==='json'){const t=text.trim();if(t.startsWith('['))return parseJSONArray(text);return parseGeoJSON(text);}
  const t=text.trim();
  if(t.startsWith('[')){try{return parseJSONArray(text);}catch(e){}}
  if(t.startsWith('{'))return parseGeoJSON(text);
  if(t.startsWith('<?xml')||t.startsWith('<kml'))return parseKML(text);
  if(t.includes('<gpx'))return parseGPX(text);
  return parseCSV(text);
}

// ── Data analysis ────────────────────────────────────────────────────────────
const COLORS=['#e41a1c','#377eb8','#4daf4a','#984ea3','#ff7f00','#a65628','#f781bf','#999','#1b9e77','#d95f02'];

function analyzeData(geojson){
  const feats=geojson.type==='FeatureCollection'?geojson.features:[geojson];
  const count=feats.length;
  const isPoint=feats.every(f=>f.geometry&&f.geometry.type==='Point');
  const years=new Set();
  const fields=new Set();
  feats.forEach(f=>{
    if(!f.properties)return;
    Object.entries(f.properties).forEach(([k,v])=>{
      fields.add(k);
      const kl=k.toLowerCase();
      if(/^(yr|year|taxyr|tax_year|taxyear|y|date_year)$/.test(kl)){
        const yr=parseInt(v);
        if(yr>=1990&&yr<=2099)years.add(yr);
      }
    });
  });
  const geomTypes=new Set(feats.map(f=>f.geometry?.type).filter(Boolean));
  return{count,isPoint,years:[...years].sort(),fields:[...fields],geomTypes:[...geomTypes]};
}

// ── IndexedDB storage (no size limits like localStorage) ─────────────────────
const DB_NAME='mapLayersDB',DB_VER=1,DB_STORE='layers';
let _db=null;

function openDB(){
  return new Promise((res,rej)=>{
    if(_db)return res(_db);
    const r=indexedDB.open(DB_NAME,DB_VER);
    r.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains(DB_STORE))db.createObjectStore(DB_STORE,{keyPath:'id'});};
    r.onsuccess=e=>{_db=e.target.result;res(_db);};
    r.onerror=e=>rej(e.target.error);
  });
}
function dbGetAll(){return openDB().then(db=>new Promise((res,rej)=>{const r=db.transaction(DB_STORE,'readonly').objectStore(DB_STORE).getAll();r.onsuccess=()=>res(r.result||[]);r.onerror=e=>rej(e.target.error);}));}
function dbPut(entry){return openDB().then(db=>new Promise((res,rej)=>{const tx=db.transaction(DB_STORE,'readwrite');tx.objectStore(DB_STORE).put(entry);tx.oncomplete=()=>res();tx.onerror=e=>rej(e.target.error);}));}
function dbDelete(id){return openDB().then(db=>new Promise((res,rej)=>{const tx=db.transaction(DB_STORE,'readwrite');tx.objectStore(DB_STORE).delete(id);tx.oncomplete=()=>res();tx.onerror=e=>rej(e.target.error);}));}

// Bump version counter so the map page knows to re-sync
function notifyMap(){try{localStorage.setItem('mapLayersVersion',Date.now().toString());}catch(e){}}

function showMsg(text,type){
  const el=document.getElementById('msg');
  el.textContent=text;el.className='msg '+type;
  if(type==='success')setTimeout(()=>{el.className='msg';},5000);
}

// ── Preview maps ─────────────────────────────────────────────────────────────
const previewMaps={};
function createPreview(containerId,geojson,color){
  setTimeout(()=>{
    const el=document.getElementById(containerId);
    if(!el)return;
    // Skip preview for tabular-only data (no geometries)
    const feats=geojson.type==='FeatureCollection'?geojson.features:[geojson];
    const hasGeom=feats.some(f=>f.geometry!=null);
    if(!hasGeom){
      el.style.height='auto';el.style.padding='12px';el.style.textAlign='center';el.style.fontSize='12px';el.style.color='#888';
      el.innerHTML='&#128202; Tabular data &mdash; no map preview (aggregated by neighborhood on the map)';
      return;
    }
    const m=L.map(el,{zoomControl:false,attributionControl:false,dragging:false,scrollWheelZoom:false,doubleClickZoom:false,touchZoom:false});
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:18}).addTo(m);
    const layer=L.geoJSON(geojson,{
      style:()=>({color:color,weight:2,fillColor:color,fillOpacity:0.25}),
      pointToLayer:(f,ll)=>L.circleMarker(ll,{radius:3,fillColor:color,color:'#fff',weight:1,fillOpacity:0.7})
    }).addTo(m);
    try{m.fitBounds(layer.getBounds(),{padding:[10,10]});}catch(e){m.setView([35.09,-106.55],11);}
    previewMaps[containerId]=m;
  },100);
}

// ── Render layer list ────────────────────────────────────────────────────────
function renderLayers(){
  dbGetAll().then(layers=>{
    const list=document.getElementById('layerList');
    if(!layers.length){
      list.innerHTML='<div class="empty-state"><div class="icon">&#128506;</div><p>No data uploaded yet.<br>Upload files above to add layers to the map.</p></div>';
      document.getElementById('storageSize').textContent='0 KB';
      return;
    }
    Object.keys(previewMaps).forEach(k=>{try{previewMaps[k].remove();}catch(e){}delete previewMaps[k];});
    let totalBytes=0;layers.forEach(l=>{totalBytes+=(l._sizeEstimate||0);});
    const kb=Math.round(totalBytes/1024);
    document.getElementById('storageSize').textContent=kb>1024?(kb/1024).toFixed(1)+' MB':kb+' KB';

    list.innerHTML='<div class="section-title">Uploaded Layers ('+layers.length+')</div>'+
      layers.map(l=>{
        const info=l.analysis||{};const mapId='preview-'+l.id;
        const sizeKB=l._sizeEstimate?Math.round(l._sizeEstimate/1024):0;
        return '<div class="layer-card" data-id="'+l.id+'">'+
          '<div class="top"><div class="dot" style="background:'+l.color+'"></div><div class="name" title="'+l.fileName+'">'+l.fileName+'</div></div>'+
          '<div class="meta">'+
            '<span>'+l.featureCount+' feature'+(l.featureCount!==1?'s':'')+'</span>'+
            (info.geomTypes?'<span>'+info.geomTypes.join(', ')+'</span>':'')+
            (info.fields?'<span>'+info.fields.length+' fields</span>':'')+
            '<span>~'+sizeKB+' KB</span>'+
          '</div>'+
          (info.years&&info.years.length?'<div class="year-tags">'+info.years.map(y=>'<span class="year-tag">'+y+'</span>').join('')+'</div>':'')+
          '<div class="actions">'+
            '<button class="toggle-vis'+(l.visible?' active':'')+'">'+(l.visible?'&#128065; Visible':'&#128064; Hidden')+'</button>'+
            '<button class="zoom-btn">&#9678; Zoom to</button>'+
            '<button class="danger remove-btn">&times; Remove</button>'+
          '</div>'+
          '<div class="preview-map" id="'+mapId+'"></div>'+
        '</div>';
      }).join('');

    list.querySelectorAll('.toggle-vis').forEach(btn=>btn.addEventListener('click',function(){
      const id=parseInt(this.closest('.layer-card').dataset.id);
      dbGetAll().then(all=>{const e=all.find(l=>l.id===id);if(!e)return;e.visible=!e.visible;dbPut(e).then(()=>{notifyMap();renderLayers();});});
    }));
    list.querySelectorAll('.remove-btn').forEach(btn=>btn.addEventListener('click',function(){
      const id=parseInt(this.closest('.layer-card').dataset.id);
      dbDelete(id).then(()=>{notifyMap();renderLayers();});
    }));
    list.querySelectorAll('.zoom-btn').forEach(btn=>btn.addEventListener('click',function(){
      const id=this.closest('.layer-card').dataset.id;
      window.open('index.html#zoom-upload-'+id,'_blank');
    }));
    layers.forEach(l=>{try{createPreview('preview-'+l.id,l.geojson,l.color);}catch(e){}});
  });
}

// ── File handling ────────────────────────────────────────────────────────────
let nextId=Date.now();

function addLayer(geojson,fileName){
  const id=nextId++;
  dbGetAll().then(all=>{
    const color=COLORS[all.length%COLORS.length];
    const analysis=analyzeData(geojson);
    const entry={id,fileName,color,visible:true,featureCount:analysis.count,
      analysis:{years:analysis.years,fields:analysis.fields,geomTypes:[...analysis.geomTypes],isPoint:analysis.isPoint},
      geojson,_sizeEstimate:JSON.stringify(geojson).length};
    dbPut(entry).then(()=>{
      notifyMap();
      const isTabular=analysis.geomTypes.length===0;
      const hasNbhd=analysis.fields.some(f=>/^(nbhd|neighborhood|nbrhd|neigh|hood|nghbrhd|nghbr)$/i.test(f));
      const tabNote=isTabular?(hasNbhd?' (tabular \u2014 will aggregate by neighborhood on the map)':' (tabular \u2014 no coordinates)'):'';
      showMsg(analysis.count+' record'+(analysis.count!==1?'s':'')+' loaded from '+fileName+(analysis.years.length?' (years: '+analysis.years.join(', ')+')':'')+tabNote,'success');
      renderLayers();
    }).catch(err=>showMsg('Failed to save: '+err.message,'error'));
  });
}

function handleFiles(files){
  Array.from(files).forEach(file=>{
    const ext=file.name.split('.').pop().toLowerCase();
    const reader=new FileReader();
    reader.onerror=()=>showMsg('Failed to read '+file.name,'error');
    if(ext==='dbf'){
      reader.onload=ev=>{try{addLayer(parseDBF(ev.target.result),file.name);}catch(err){showMsg('Error: '+file.name+' — '+err.message,'error');}};
      reader.readAsArrayBuffer(file);
    }else{
      reader.onload=ev=>{try{addLayer(detectFormat(file.name,ev.target.result),file.name);}catch(err){showMsg('Error: '+file.name+' — '+err.message,'error');}};
      reader.readAsText(file);
    }
  });
}

// ── Event listeners ──────────────────────────────────────────────────────────
const uploadZone=document.getElementById('uploadZone');
const fileInput=document.getElementById('fileInput');
uploadZone.addEventListener('click',()=>fileInput.click());
fileInput.addEventListener('change',e=>{if(e.target.files.length)handleFiles(e.target.files);e.target.value='';});
uploadZone.addEventListener('dragover',e=>{e.preventDefault();uploadZone.classList.add('dragover');});
uploadZone.addEventListener('dragleave',()=>uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop',e=>{e.preventDefault();uploadZone.classList.remove('dragover');if(e.dataTransfer.files.length)handleFiles(e.dataTransfer.files);});

// Listen for changes from map page
window.addEventListener('storage',e=>{if(e.key==='mapLayersVersion')renderLayers();});

// Init
renderLayers();
</script>
